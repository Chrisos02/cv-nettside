<html lang="no">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  </head>

  <body>
    <nav>
      <ul class="navbar">
        <li><a href="index.html#om-meg">Om meg</a></li>
        <li><a href="certificates.html" class="active">Certificates</a></li>
        <li><a href="prosjekter.html">Prosjekter</a></li>
        <li><a href="index.html#kontakt">Kontakt</a></li>
      </ul>
    </nav>

    <section class="certificates-page">
      <h1>🎓 Certificates</h1>
      <p>Mine relevante Certificates innen cybersikkerhet.</p>

      <div class="cert-grid">
        <div class="cert-card">
          <img src="bilder/THM_cert.png" alt="TryHackMe-logo">
          <h3>TryHackMe: Cyber Security 101</h3>
          <p>Fullført: August 2024</p>
          <a href="https://tryhackme.com/p/Chrisos" target="_blank">Se profil</a>
        </div>

        <div class="cert-card">
          <img src="bilder/google_cert.png" alt="Google-logo">
          <h3>Google Cybersecurity Certificate</h3>
          <p>Fullført: 2024</p>
        </div>

        <div class="cert-card">
          <img src="bilder/Network_cert.png" alt="Cisco-logo">
          <h3>Cisco Networking Basics</h3>
          <p>Fullført: 2024</p>
        </div>
      </div>
    </section>

    <button id="darkModeToggle">🌙 Bytt tema</button>

<!-- Lightbox-container -->
<div id="lightbox" class="lightbox">
  <span class="close-btn">&times;</span>
  <img src="" alt="forstørret sertifikat">
</div>

<script>
  // Dark mode – husker valg mellom sider
  const toggle = document.getElementById('darkModeToggle');

  // Sjekk lagret status
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
  }

  toggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('darkMode', isDark);
  });

  // Lightbox
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = lightbox.querySelector("img");
  const closeBtn = document.querySelector(".close-btn");
  const certImages = document.querySelectorAll(".cert-card img");

  certImages.forEach(img => {
    img.addEventListener("click", () => {
      lightboxImg.src = img.src;
      lightbox.style.display = "flex";
    });
  });

  closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
  });

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      lightbox.style.display = "none";
    }
  });
</script>

  </body>
</html>
