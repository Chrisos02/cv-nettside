    <nav>

    <section class="projects-page">
      <h1>💻 Prosjekter</h1>
      <p>Her vil jeg legge ut egne prosjekter innen cybersikkerhet.</p>

      <div class="project-grid">
        <div class="project-card placeholder">
          <h3>🚧 Ingen prosjekter enda</h3>
          <p>Jeg oppdaterer denne seksjonen når jeg legger ut mine første fullførte prosjekter.</p>
        </div>
      </div>
    </section>

    <button id="darkModeToggle">🌙 Bytt tema</button>

    <script>
      // Dark mode med minne
      const toggle = document.getElementById('darkModeToggle');
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
      }
      toggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
      });
    </script>
  </body>
